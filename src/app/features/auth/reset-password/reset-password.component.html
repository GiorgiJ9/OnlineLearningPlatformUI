<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">🎓 LearnHub</div>
    <h1>Reset Password</h1>
    <p>Enter your email and new password below</p>
  </div>

  <div class="auth-right">
    <div class="auth-card fade-in">
      <h2>Reset Password</h2>
      <p class="sub">Enter your email and new password</p>

      <div class="alert alert-success" *ngIf="success">✅ {{success}}</div>
      <div class="alert alert-danger"  *ngIf="error">❌ {{error}}</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input formControlName="email" type="email" class="form-control" placeholder="you@example.com">
          <div class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email required.</div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input formControlName="newPassword" type="password" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 symbol">
          <div class="error-msg" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            Min 8 characters, 1 uppercase & 1 special character.
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
          <span *ngIf="loading" class="btn-spinner"></span>
          {{loading ? 'Resetting...' : 'Reset Password'}}
        </button>
      </form>

      <p class="auth-foot"><a routerLink="/auth/login">← Back to Login</a></p>
    </div>
  </div>
</div>
