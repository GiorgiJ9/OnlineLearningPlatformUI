<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">🎓 LearnHub</div>
    <h1>Welcome back!</h1>
    <p>Sign in to continue your learning journey</p>
    <div class="features">
      <div class="feat">✅ Access premium courses</div>
      <div class="feat">✅ Track your progress</div>
      <div class="feat">✅ Get certified</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card fade-in">
      <h2>Sign In</h2>
      <p class="sub">Enter your credentials below</p>

      <div class="alert alert-danger" *ngIf="error">{{error}}</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input formControlName="email" type="email" class="form-control" placeholder="you@example.com">
          <div class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email required.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input formControlName="password" [type]="showPw ? 'text' : 'password'" class="form-control" placeholder="••••••••">
            <button type="button" class="input-addon" (click)="showPw=!showPw">{{showPw?'🙈':'👁️'}}</button>
          </div>
          <div class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Password required.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
          <span *ngIf="loading" class="btn-spinner"></span>
          {{loading ? 'Signing in...' : 'Sign In'}}
        </button>
      </form>

      <p class="auth-foot">Don't have an account? <a routerLink="/auth/register">Create one</a></p>
      <p class="auth-foot">Forgot password? <a routerLink="/auth/reset-password">Reset it</a></p>
    </div>
  </div>
</div>
